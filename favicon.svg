<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a4cc7"/>
      <stop offset="100%" stop-color="#3a1f78"/>
    </linearGradient>
  </defs>

  <!-- Squircle container fills the entire viewBox (256x256, no padding) -->
  <path d="
    M 128 0
    C 202 0, 256 54, 256 128
    C 256 202, 202 256, 128 256
    C 54 256, 0 202, 0 128
    C 0 54, 54 0, 128 0
    Z" fill="url(#bg)"/>

  <!-- Q glyph: hexagonal bowl + diagonal tail (scaled up to match new container) -->
  <g transform="translate(128 128)">
    <!-- bowl (hex ring with even-odd fill rule) -->
    <path d="
      M 0 -77 L 67 -38 L 67 38 L 0 77 L -67 38 L -67 -38 Z
      M 0 -42 L -37 -21 L -37 21 L 0 42 L 37 21 L 37 -21 Z"
      fill="#f4ecff" fill-rule="evenodd"/>

    <!-- diagonal tail (proportionally scaled) -->
    <polygon points="27,40 75,75 93,56 40,21" fill="#f4ecff"/>
  </g>
</svg>
